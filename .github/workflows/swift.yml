name: Build Unciv iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Create iOS Module
        run: |
          mkdir -p ios/src/main/kotlin/com/unciv/app

          if ! grep -q '":ios"' settings.gradle.kts; then
            echo 'include(":ios")' >> settings.gradle.kts
          fi

          cat > ios/build.gradle <<'EOF'
          buildscript {
              repositories {
                  mavenCentral()
                  google()
                  gradlePluginPortal()
              }

              dependencies {
                  classpath "com.mobidevelop.robovm:robovm-gradle-plugin:2.3.21"
              }
          }

          apply plugin: "java"
          apply plugin: "robovm"

          repositories {
              mavenCentral()
              google()
          }

          def gdxVersion = "1.12.1"
          def roboVMVersion = "2.3.21"

          dependencies {
              implementation project(":core")

              implementation "com.mobidevelop.robovm:robovm-rt:${roboVMVersion}"
              implementation "com.mobidevelop.robovm:robovm-cocoatouch:${roboVMVersion}"

              implementation "com.badlogicgames.gdx:gdx:${gdxVersion}"
              implementation "com.badlogicgames.gdx:gdx-backend-robovm:${gdxVersion}"
              implementation "com.badlogicgames.gdx:gdx-platform:${gdxVersion}:natives-ios"
          }

          robovm {
              iosSkipSigning = true
              archs = "arm64"
          }

          ext {
              mainClassName = "com.unciv.app.IOSLauncher"
          }
          EOF

          cat > ios/src/main/kotlin/com/unciv/app/IOSLauncher.kt <<'EOF'
          package com.unciv.app

          import org.robovm.apple.foundation.NSAutoreleasePool
          import org.robovm.apple.uikit.UIApplication
          import com.badlogic.gdx.backends.iosrobovm.IOSApplication
          import com.badlogic.gdx.backends.iosrobovm.IOSApplicationConfiguration
          import com.unciv.UncivGame

          class IOSLauncher : IOSApplication.Delegate() {
              override fun createApplication(): IOSApplication {
                  val config = IOSApplicationConfiguration()
                  return IOSApplication(UncivGame(), config)
              }
          }

          fun main(args: Array<String>) {
              val pool = NSAutoreleasePool()
              UIApplication.main(args, null, IOSLauncher::class.java)
              pool.close()
          }
          EOF

      - name: Build IPA
        run: |
          ./gradlew :ios:createIPA --stacktrace
        env:
          GRADLE_OPTS: -Xmx4g

      - name: Collect IPA
        run: |
          mkdir -p artifacts
          find . -name "*.ipa" -exec cp {} artifacts/Unciv-Sideload.ipa \;

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unciv-iOS-Sideload
          path: artifacts/Unciv-Sideload.ipa
