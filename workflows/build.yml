name: Build Unciv iOS IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permissions for Gradle
        run: chmod +x gradlew

      - name: Compile and Package iOS IPA
        run: ./gradlew :ios:createIpa
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Locate and Rename IPA
        run: |
          mkdir -p build/artifacts
          # Find the generated ipa file from the robovm/ios build directory
          find ios/build/robovm -name "*.ipa" -exec cp {} build/artifacts/Unciv-Unsigned.ipa \;
          echo "IPA located and staged successfully."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unciv-iOS-Bundle
          path: build/artifacts/Unciv-Unsigned.ipa
          retention-days: 7
